<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>library generator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>library generator</h1>
  <p class="subtitle">generate clean c# or c++ projects instantly</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('cs')">c#</button>
    <button class="tab" onclick="switchTab('cpp')">c++</button>
  </div>

  <div id="cs" class="tab-content active">
    <div class="grid">
      <div>
        <label>dll name</label>
        <input placeholder="MyLibrary">
      </div>
      <div>
        <label>version</label>
        <input placeholder="1.0.0">
      </div>
      <div class="full">
        <label>c# code</label>
        <textarea placeholder="paste your c# code here"></textarea>
      </div>
    </div>
  </div>

  <div id="cpp" class="tab-content">
    <div class="grid">
      <div>
        <label>library name</label>
        <input placeholder="MyLibrary">
      </div>
      <div>
        <label>version</label>
        <input placeholder="1.0.0">
      </div>
      <div class="full">
        <label>header (.h)</label>
        <textarea placeholder="paste header code"></textarea>
      </div>
      <div class="full">
        <label>source (.cpp)</label>
        <textarea placeholder="paste cpp code"></textarea>
      </div>
    </div>
  </div>

  <button>generate</button>
</div>

<script>
function switchTab(id) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"))
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"))

  document.querySelector(`[onclick="switchTab('${id}')"]`).classList.add("active")
  document.getElementById(id).classList.add("active")
}
</script>

</body>
</html>
